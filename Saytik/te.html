<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Таверна Timur</title>
    <style>
        body {
            margin: 0;
            font-family: sans-serif;
        }
        header {
            background-color: #696969; 
            padding: 15px 20px;
            border-bottom: 2px solid #ccc; 
            
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            color: #333;
            flex-shrink: 0;
            display: flex;
            align-items: center;
        }
        .logo img {
            height: 40px;
            width: auto;
            vertical-align: middle;
            margin-right: 10px;
        }
        
        .search {
            margin-left: 10px;
            flex-shrink: 0;
            flex-grow: 1;
            max-width: 600px;
        }
        
        .search input {
            padding: 6px 15px;
            border: 2px solid #A9A9A9;
            border-radius: 20px;
            background-color: #808080;
            color: #fff;
            font-size: 14px;
            width: 100%; 
            box-sizing: border-box; 
            transition: all 0.3s;
        }
        
        .search input::placeholder {
            color: #ccc;
            font-style: italic;
            content: "🔍"; 
        }
        
        .search input:hover {
            background-color: #909090;
            border-color: #ffd98a;
        }
        
        .search input:focus {
            outline: none;
            background-color: #fff;
            color: #333;
            border-color: #ffd98a;
            box-shadow: 0 0 5px #ffd98a;
        }

        main {
            padding: 20px;
        }

        #menu, #menu ul {
            list-style: none;
            border: 1px solid #A9A9A9;
            background-color: #808080;
            padding: 0;
            margin: 0;
        }
        
        #menu {
            display: flex;      
            padding: 0;
        }
        
        #menu li {
            margin-right: 3px;
            border: 1px solid #ecffec;
            position: relative;     
        }
        
        #menu ul {
            position: absolute;
            top: 100%;             
            left: -1px;
            width: 200px;
            padding: 0;
            display: none;       
            z-index: 100;           
        }
        
        #menu ul li {
            float: none;           
            margin: 0;
            padding: 0;
            line-height: 15px;
            border: none;       
        }
        
        #menu a:link, #menu a:visited {
            display: block;
            font-family: Tahoma;
            font-size: 0.75em;
            font-weight: bold;
            text-align: left;
            text-decoration: none;
            color: #000;
            padding: 8px 10px;     
            white-space: nowrap;     
        }
        
        #menu li:hover {
            background-color: #ffd98a;
            border: 1px solid #000;
        }
        
        #menu li:hover ul {
            display: block;
        }
        
        #menu ul li:hover {
            background-color: #FFFFFF;
            border: 1px solid #000;
        }
        
        #menu ul li a {
            border: none;
        }
        
        @media (max-width: 900px) {
            .search {
                max-width: 300px; 
            }
        }
        
        @media (max-width: 700px) {
            header {
                flex-wrap: wrap;
            }
            
            .search {
                margin-left: 0;
                width: 100%;
                max-width: 100%; 
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">
            <img src="Logo.jpg" alt="Логотип">
            <span>Таверна Тимы</span>
        </div>
        
        <ul id="menu">
            <li><a href="#">Игры</a>
                <ul>
                    <li><a href="#">Дока 2</a></li>
                    <li><a href="#">Майнкрафт</a></li>
                    <li><a href="#">Ещё что-то</a></li>
                    <li><a href="#">Тут наверное что-то ещё</a></li>
                    <li><a href="#">И ещё</a></li>
                    <li><a href="#">И тут что-то ещё</a></li>
                    <li><a href="#">Тимур</a></li>
                </ul>
            </li>
            <li><a href="#">Сообщество</a>
                <ul>
                    <li><a href="#">Форум</a></li>
                    <li><a href="#">Вумен ру</a></li>
                    <li><a href="#">Форум по доте</a></li>
                    <li><a href="#">Создать форум</a></li>
                </ul>
            </li>
            <li><a href="#">Разное</a></li>
        </ul>
        
        <div class="search">
            <input type="text" placeholder="🔍 Поиск по сайту...">
        </div>
    </header>

    <main>
        <h1>Добро пожаловать!</h1>
        <p>Основа</p>
    </main>
</body>
</html>
